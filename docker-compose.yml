services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mmf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mmf}
      POSTGRES_DB: ${POSTGRES_DB:-mmf_dev}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - mmf-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mmf} -d ${POSTGRES_DB:-mmf_dev}']
      interval: 2s
      timeout: 5s
      retries: 10

  dbmate:
    image: ghcr.io/amacneil/dbmate
    command: ['--wait', 'up']
    environment:
      DATABASE_URL: 'postgres://${POSTGRES_USER:-mmf}:${POSTGRES_PASSWORD:-mmf}@postgres:5432/${POSTGRES_DB:-mmf_dev}?sslmode=disable'
    volumes:
      - ./db/migrations:/db/migrations
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
      target: development
    environment:
      PORT: ${PORT:-3001}
      NODE_ENV: development
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DATABASE_URL: 'postgres://${POSTGRES_USER:-mmf}:${POSTGRES_PASSWORD:-mmf}@postgres:5432/${POSTGRES_DB:-mmf_dev}?sslmode=disable'
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-pk_test_placeholder}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_placeholder}
      CLERK_WEBHOOK_SIGNING_SECRET: ${CLERK_WEBHOOK_SIGNING_SECRET:-whsec_placeholder}
      MOCK_AUTH: ${MOCK_AUTH:-true}
    ports:
      - '${PORT:-3001}:3001'
    volumes:
      - ./packages/backend/src:/app/src
      - /app/node_modules
    depends_on:
      dbmate:
        condition: service_completed_successfully
    healthcheck:
      test:
        ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    command: ['npm', 'run', 'dev', '--', '--host']
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-pk_test_placeholder}
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mmf-pgdata:
