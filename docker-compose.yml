version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mmf
      POSTGRES_PASSWORD: mmf
      POSTGRES_DB: mmf
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mmf']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: amacneil/dbmate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://mmf:mmf@postgres:5432/mmf?sslmode=disable
    volumes:
      - ./db:/db
    command: up

volumes:
  postgres_data:
