# .github/workflows/deploy-main.yml
# Deploys to main after CI passes on main branch
name: Deploy Main

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [] # Depends on CI passing (branch protection)
    environment: main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_MAIN }}
          aws-region: ap-southeast-2

      - run: npm ci
      - run: npm run build

      # Run database migrations via dbmate
      - name: Install dbmate
        run: |
          curl -fsSL -o /usr/local/bin/dbmate https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
          chmod +x /usr/local/bin/dbmate
      - name: Run migrations
        run: dbmate up
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_MAIN }}

      # Deploy frontend to S3 + CloudFront
      - name: Deploy frontend
        run: |
          aws s3 sync dist/frontend s3://${{ secrets.S3_BUCKET_MAIN }} --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_MAIN }} \
            --paths "/*"

      # Deploy backend (adjust based on hosting — ECS, Lambda, etc.)
      - name: Deploy backend
        run: |
          # Backend deployment steps — depends on hosting choice
          echo "Backend deployment configured per infrastructure"
